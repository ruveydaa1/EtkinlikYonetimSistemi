<header class="navbar">

    <div class="navbar-logo">

        <span class="logo-icon"></span>

        <mat-icon>confirmation_number</mat-icon>
        <span class="logo-text">Eventix</span>

    </div>

    <nav class="navbar-menu">

        <a routerLink="/home" routerLinkActive="active">Ana Sayfa</a>

        <a routerLink="/events" routerLinkActive="active">Etkinlikler</a>

        <a routerLink="/my-tickets" routerLinkActive="active">Biletlerim</a>

        <a routerLink="/profile" routerLinkActive="active">Profil</a>

        @if(isOrganizer){

        <a routerLink="/organizer/dashboard">
            Organizator Paneli
        </a>

        }


    </nav>

    <div class="navbar-actions">

        @if(!isLoggedIn){

        <button class="login-btn" routerLink="/login">
            Giriş Yap
        </button>

        <button class="register-btn" routerLink="/signup">
            Kayıt Ol
        </button>

        } @else {

        <button class="logout-btn" (click)="logout()">
            Çıkış Yap
        </button>

        }

    </div>

</header>
